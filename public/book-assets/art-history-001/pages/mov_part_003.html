<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>目次</title>
    <link rel="stylesheet" href="../css/style_page.css">

    <script src="../js/toc.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 558px;
            height: 820px;
            overflow: hidden;
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
            background: #3F3631;
            color: #ffffff;
        }

        .page-wrap {
            position: relative;
            width: 558px;
            height: 820px;
            padding: 56px 40px 52px;
            box-sizing: border-box;
        }

        .toc-title {
            margin: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .toc-scroll {
            position: absolute;
            left: 40px;
            right: 40px;
            top: 120px;
            bottom: 60px;
            overflow-y: auto;
        }

        .toc-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px;
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box;
        }

        .toc-link:hover {
            background: rgba(255,255,255,0.1);
        }

        .toc-link-title {
            flex: 1;
            padding-right: 12px;
        }

        .toc-link-page {
            flex: 0 0 auto;
            opacity: 0.9;
        }

        .toc-empty {
            padding: 8px;
            color: rgba(255,255,255,0.85);
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <h1 class="toc-title">目 次</h1>
    <div id="toc" class="toc-scroll"></div>
</div>

<script>
    function goToPage(page) {
        window.parent.postMessage({
            type: "gotoPage",
            page: page
        }, "*");
    }

    function getTocItems() {
        if (Array.isArray(window.BOOK_TOC) && window.BOOK_TOC.length > 0) {
            return window.BOOK_TOC;
        }
        if (Array.isArray(window.TOC_ITEMS) && window.TOC_ITEMS.length > 0) {
            return window.TOC_ITEMS;
        }
        if (Array.isArray(window.tocItems) && window.tocItems.length > 0) {
            return window.tocItems;
        }
        return [];
    }

    function buildTOC() {
        const container = document.getElementById("toc");
        const tocItems = getTocItems();

        container.innerHTML = "";

        if (!tocItems || tocItems.length === 0) {
            container.innerHTML = '<div class="toc-empty">目次データがありません</div>';
            return;
        }

        tocItems.forEach(item => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "toc-link";
            btn.innerHTML = `
                <span class="toc-link-title">${item.title}</span>
                <span class="toc-link-page">${String(item.page).padStart(3, "0")}</span>
            `;
            btn.onclick = () => goToPage(item.page);
            container.appendChild(btn);
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", buildTOC);
    } else {
        buildTOC();
    }
</script>

</body>
</html>
