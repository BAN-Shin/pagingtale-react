<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>カバー</title>
<link rel="stylesheet" href="../css/style_page.css"></link>

<style>
body{
    border:none;
    overflow: hidden;
}

/* 共通カラー */
:root {
    --button-color: #3F3631;
}

/* iframe中央に80%配置 */
#mov_P001_mask_01 {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80%;
    height: 80%;
    transform: translate(-50%, -50%);
}

/* 中身は左基準 */
.media-stage {
    position: relative;
    width: 100%;
    height: 100%;
}

/* 動画 */
#mov_P001_K01 {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
</style>

<script src="..\js\exe_script.js"></script>
<script>
var iframeId = "iframe4";
initializeMaskSizes(iframeId);
</script>
</head>

<body>

<div id="mov_P001_mask_01">
    <div class="media-stage">

        <video id="mov_P001_K01" controls>
            <source src="https://media.pagingtale.com/self-introduction/material/page_001/mov/k01_p001.mp4" type="video/mp4">
        </video>

    </div>
</div>

<div class="footer">p001</div>

<script>
(function () {
    if (window.__pagingTaleArrowNavInserted) return;
    window.__pagingTaleArrowNavInserted = true;

    var arrowLock = false;
    var lastArrowAt = 0;

    function isEditableTargetForArrowKey(target) {
        if (!target) return false;
        var tagName = target.tagName ? target.tagName.toLowerCase() : "";

        if (target.isContentEditable) return true;
        if (tagName === "textarea") return true;
        if (tagName === "select") return true;
        if (tagName === "button") return true;

        if (tagName === "input") {
            var inputType = (target.type || "").toLowerCase();
            if (
                inputType === "text" ||
                inputType === "search" ||
                inputType === "url" ||
                inputType === "tel" ||
                inputType === "password" ||
                inputType === "email" ||
                inputType === "number" ||
                inputType === ""
            ) {
                return true;
            }
        }
        return false;
    }

    document.addEventListener("keydown", function (e) {
        var key = e.key || "";
        var keyCode = e.keyCode || 0;
        var target = e.target;
        var now = Date.now();

        if (e.repeat) return;
        if (arrowLock) return;
        if (now - lastArrowAt < 400) return;
        if (isEditableTargetForArrowKey(target)) return;

        if (target && target.tagName && target.tagName.toLowerCase() === "video") {
            return;
        }

        if (key === "ArrowLeft" || keyCode === 37) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "previous"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);
            return;
        }

        if (key === "ArrowRight" || keyCode === 39) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "next"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);
            return;
        }
    }, true);
})();
</script>

</body>
</html>
