<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>自画像の描き方</title>
<link rel="stylesheet" href="../css/style_page.css"></link>

<style>
body{
    border:none;
    overflow: hidden;
}

:root {
    --button-color: #3F3631;
}

#mov_P006_mask_01 {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80%;
    height: 80%;
    transform: translate(-50%, -50%);
}

.media-stage {
    position: relative;
    width: 100%;
    height: 100%;
}

#mov_P006_K01 {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.overlay-image-bottom-right {
    position: absolute;
    right: 20px;
    bottom: 20px;
    width: 120px;
    pointer-events: none;
}

.overlay-controls {
    position: absolute;
    left: 0;
    top: calc(100% + 10px);
    display: flex;
    gap: 8px;
}

.overlay-btn {
    border: none;
    background: var(--button-color);
    color: #fff;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
}

.overlay-btn.is-active {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
}
</style>

</head>

<body>

<div id="mov_P006_mask_01">
    <div class="media-stage">

        <video id="mov_P006_K01" controls>
            <source id="videoSource"
                src="https://media.pagingtale.com/self-introduction/material/page_006/mov/one-drawing-way-v2.mp4"
                type="video/mp4">
        </video>

    </div>

    <div class="overlay-controls">
        <button class="overlay-btn is-active" id="btn01">01</button>
        <button class="overlay-btn" id="btn02">02</button>
        <button class="overlay-btn" id="btn03">03</button>
    </div>
</div>

<div class="footer">p006</div>

<script>
const video = document.getElementById("mov_P006_K01");
const source = document.getElementById("videoSource");
const buttons = document.querySelectorAll(".overlay-btn");

function switchVideo(src, index) {
    video.pause();
    source.src = src;
    video.load(); // ←ここで止まる（再生しない）

    buttons.forEach(btn => btn.classList.remove("is-active"));
    buttons[index].classList.add("is-active");
}

document.getElementById("btn01").onclick = () => {
    switchVideo("https://media.pagingtale.com/self-introduction/material/page_006/mov/one-drawing-way-v2.mp4", 0);
};

document.getElementById("btn02").onclick = () => {
    switchVideo("https://media.pagingtale.com/self-introduction/material/page_006/mov/sample-boy.mp4", 1);
};

document.getElementById("btn03").onclick = () => {
    switchVideo("https://media.pagingtale.com/self-introduction/material/page_006/mov/sample-girl.mp4", 2);
};
</script>

</body>
</html>
