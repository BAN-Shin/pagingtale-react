<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>たったひとつの絵の描き方</title>
<link rel="stylesheet" href="../css/style_page.css"></link>

<style>
body{
    border:none;
    overflow: hidden;
}

:root {
    --area-left: 59.35px;
    --area-top: 84.79px;
    --area-width: 450.69px;
    --area-height: 639.02px;
    --button-color: #3F3631;
}

#mov_P006_mask_01 {
    position: absolute;
    left: var(--area-left);
    top: var(--area-top);
    width: var(--area-width);
    height: var(--area-height);
}

.media-stage {
    position: relative;
    width: 100%;
    height: 100%;
}

#mov_P006_K01 {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.overlay-controls {
    position: absolute;
    left: 0;
    top: calc(100% + 10px);
    width: 100%;
    display: flex;
    gap: 8px;
}

.overlay-btn {
    border: none;
    background: var(--button-color);
    color: #fff;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
}

.overlay-btn.is-active {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
}
</style>

</head>

<body>

<div id="mov_P006_mask_01">
    <div class="media-stage">

        <video id="mov_P006_K01" controls>
            <source id="videoSource"
                src="https://media.pagingtale.com/self-introduction/material/page_006/mov/one-drawing-way.mp4"
                type="video/mp4">
        </video>

    </div>

    <!-- 🔘 3ボタン -->
    <div class="overlay-controls">
        <button class="overlay-btn is-active" id="btn01">01</button>
        <button class="overlay-btn" id="btn02">02</button>
        <button class="overlay-btn" id="btn03">03</button>
    </div>
</div>

<div class="footer">p006</div>

<script>
const video = document.getElementById("mov_P006_K01");
const source = document.getElementById("videoSource");

const buttons = document.querySelectorAll(".overlay-btn");

function switchVideo(src, index) {
    video.pause();
    source.src = src;
    video.load();
    video.play();

    buttons.forEach(btn => btn.classList.remove("is-active"));
    buttons[index].classList.add("is-active");
}

// 🔥 新構成
document.getElementById("btn01").onclick = () => {
    switchVideo(
        "https://media.pagingtale.com/self-introduction/material/page_006/mov/one-drawing-way.mp4",
        0
    );
};

document.getElementById("btn02").onclick = () => {
    switchVideo(
        "https://media.pagingtale.com/self-introduction/material/page_006/mov/sample-boy.mp4",
        1
    );
};

document.getElementById("btn03").onclick = () => {
    switchVideo(
        "https://media.pagingtale.com/self-introduction/material/page_006/mov/sample-girl.mp4",
        2
    );
};
</script>

</body>
</html>
