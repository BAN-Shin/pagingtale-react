<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>目次</title>
    <link rel="stylesheet" href="../css/style_page.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 558px;
            height: 820px;
            overflow: hidden;
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
            background: #3F3631;
            color: #ffffff;
        }

        .page-wrap {
            position: relative;
            width: 558px;
            height: 820px;
            padding: 56px 40px 52px;
            box-sizing: border-box;
        }

        .toc-title {
            margin: 0 0 36px 0;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.18em;
        }

        .toc-scroll {
            position: absolute;
            left: 40px;
            right: 40px;
            top: 132px;
            bottom: 60px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .toc-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 9px 8px;
            background: transparent;
            color: white;
            border: none;
            border-bottom: 1px dotted rgba(255,255,255,0.25);
            cursor: pointer;
            text-align: left;
            font-weight: 700;
        }

        .toc-link:hover {
            background: rgba(255,255,255,0.1);
        }

        .toc-link-title {
            flex: 1;
            padding-right: 12px;
        }

        .toc-link-page {
            flex: 0 0 auto;
            font-family: monospace;
        }

        .toc-empty {
            padding: 8px;
            color: rgba(255,255,255,0.85);
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <h1 class="toc-title">目 次</h1>
    <div id="toc" class="toc-scroll"></div>
</div>

<script>
function goToPage(page) {
    window.parent.postMessage({
        type: "gotoPage",
        page: Number(page)
    }, "*");
}

function renderTOC(items) {
    const container = document.getElementById("toc");
    container.innerHTML = "";

    if (!items || items.length === 0) {
        container.innerHTML = '<div class="toc-empty">目次データがありません</div>';
        return;
    }

    let previousTitle = "";

    items
        .filter(i => i && i.title && Number(i.page) > 0)
        .sort((a, b) => Number(a.page) - Number(b.page))
        .filter(item => {
            const title = String(item.title).trim();

            if (title === previousTitle) {
                return false;
            }

            previousTitle = title;
            return true;
        })
        .forEach(item => {
            const btn = document.createElement("button");
            btn.className = "toc-link";

            btn.innerHTML = `
                <span class="toc-link-title">${item.title}</span>
                <span class="toc-link-page">${String(item.page).padStart(3,"0")}</span>
            `;

            btn.onclick = () => goToPage(item.page);
            container.appendChild(btn);
        });
}

async function buildTOC() {
    try {
        const res = await fetch("../data/toc.json?v=" + Date.now(), {
            cache: "no-store"
        });

        const data = await res.json();

        const items =
            data.toc ||
            data.items ||
            data.tocItems ||
            data;

        renderTOC(items);

    } catch (e) {
        console.error(e);
        document.getElementById("toc").innerHTML =
            '<div class="toc-empty">目次の読み込みに失敗しました</div>';
    }
}

document.addEventListener("DOMContentLoaded", buildTOC);
</script>

</body>
</html>
