<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>自己紹介シートを作りましょう</title>
<link rel="stylesheet" href="../css/style_page.css"></link>

<style>
body{
    border:none;
    overflow: hidden;
}

:root {
    --button-color: #3F3631;
}

/* 全体を中央80% */
#mov_P004_mask_01 {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80%;
    height: 80%;
    transform: translate(-50%, -50%);
}

/* 中身は左基準 */
.media-stage {
    position: relative;
    width: 100%;
    height: 100%;
}

/* 画像 */
.overlay-image {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
}

.overlay-image.is-active {
    display: block;
}

/* ボタン（左揃え） */
.overlay-controls {
    position: absolute;
    left: 0;
    top: calc(100% + 10px);
    display: flex;
    gap: 8px;
}

.overlay-btn {
    border: none;
    background: var(--button-color);
    color: #fff;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
}

.overlay-btn.is-active {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
}
</style>

<script src="../js/exe_script.js"></script>
<script>
var iframeId = "iframe8";
initializeMaskSizes(iframeId);

function showImage(index) {
    const images = [
        document.getElementById("img-01"),
        document.getElementById("img-02"),
        document.getElementById("img-03")
    ];

    const buttons = document.querySelectorAll(".overlay-btn");

    images.forEach(img => img.classList.remove("is-active"));
    buttons.forEach(btn => btn.classList.remove("is-active"));

    images[index - 1].classList.add("is-active");
    buttons[index - 1].classList.add("is-active");
}

window.addEventListener("DOMContentLoaded", function () {
    showImage(1);
});
</script>
</head>

<body>

<div id="mov_P004_mask_01">
    <div class="media-stage">

        <img id="img-01" class="overlay-image is-active"
             src="../material/page_004/mov/01-yamadatarou.jpg">

        <img id="img-02" class="overlay-image"
             src="../material/page_004/mov/02-suzukihanako.jpg">

        <img id="img-03" class="overlay-image"
             src="../material/page_004/mov/03-bantsubasa.jpg">

    </div>

    <div class="overlay-controls">
        <button class="overlay-btn is-active" onclick="showImage(1)">01</button>
        <button class="overlay-btn" onclick="showImage(2)">02</button>
        <button class="overlay-btn" onclick="showImage(3)">03</button>
    </div>
</div>

<div class="footer">p004</div>

</body>
</html>
