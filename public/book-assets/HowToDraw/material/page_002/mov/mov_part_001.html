<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Path-specific Video Play with Masking and External SVG</title>
    <style>
        #svgObject {
            position: absolute;
            top: 0;
            left: 0;
        }
        .clickablePath{
            fill:transparent;
            pointer-events:visible;
            /* fill:blue; */
            /* z-index: 10; */
        }
        #loading-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(128, 128, 128, 0.5); /* 透過50%の灰色 */
            z-index: 99; /* ローディングアイコンの前に表示 */
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; /* 背景より前に表示 */
            /* 他のスタイル属性もここに追加 */
        }
        #loading img{
            height: 150px;
            width: 150px;
        }
</style>
    <script>

        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('loading-background').style.display = 'none';
            }, 6000); // 6秒待機
        });

        // Document is ready
        // Document is ready
        window.addEventListener("DOMContentLoaded", function() {
            var videoElement = document.getElementById("maskedVideo");
            
            // alert("test");

            // Get all the paths with the class of 'clickablePath'
            var paths = document.querySelectorAll("path.clickablePath");
            paths.forEach(function(path) {
                path.addEventListener("click", function(event) {
                    console.log(event); 
                    if (videoElement.paused) {
                        videoElement.play();
                    } else {
                        videoElement.pause();
                    }
                });
            });
        });   
        

    </script>
</head>
<body>

    <div id="loading"><img src="../img/loading.gif"></div>
    <div id="loading-background"></div>

    <svg width="558" height="480" style="position: absolute; top: 0; left: 0;">
        <!-- Define mask -->
        <mask id="starMask">
            <rect x="0" y="0" width="720" height="480" fill="white"/>
            <image href="../svg/BEEPBOOL02.svg" x="0" y="0" width="720" height="480"/>
        </mask>

        <!-- Masking applied to the video -->
        <foreignObject x="0" y="0" mask="url(#starMask)" width="720" height="480">
            <video id="maskedVideo" width="720" height="480">
                <source src="../mov/0001-0360.mp4" type="video/mp4">
            </video>
        </foreignObject>
        <!-- External SVG as object -->
        <object type="image/svg+xml" data="../svg/BEEPBOOL01.svg" id="svgObject" width="720" height="480"></object>

        <path class="clickablePath" d="M0,54h37.3c14,0,43.6,5.7,43.6,94.5c0,31.3-3.7,60.1-14,74.5v1c13.5,20,16.6,55,16.6,88.4
            c0,98.1-26.2,113.5-44.4,113.5H0V54z M39.8,205.1c4.9,0,7.2-10.3,7.2-23.1c0-13.4-2.4-23.1-7.2-23.1h-1.4v46.2H39.8z M40,326.3
            c6,0,8.9-12.8,8.9-28.8s-3-28.8-8.9-28.8h-1.7v57.5H40z"/>

            c0,98.1-26.2,113.5-44.4,113.5h-39.1V54z M379.2,205.1c4.9,0,7.2-10.3,7.2-23.1c0-13.4-2.4-23.1-7.2-23.1h-1.4v46.2H379.2z

    </svg>

</body>
</html>
