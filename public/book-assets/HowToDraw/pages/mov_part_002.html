<body>

<script>
(function () {
    if (window.__pagingTaleArrowNavInserted) return;
    window.__pagingTaleArrowNavInserted = true;

    var arrowLock = false;
    var lastArrowAt = 0;

    function isEditableTargetForArrowKey(target) {
        if (!target) return false;

        var tagName = target.tagName ? target.tagName.toLowerCase() : "";

        if (target.isContentEditable) return true;
        if (tagName === "textarea") return true;
        if (tagName === "select") return true;
        if (tagName === "button") return true;

        if (tagName === "input") {
            var inputType = (target.type || "").toLowerCase();

            if (
                inputType === "text" ||
                inputType === "search" ||
                inputType === "url" ||
                inputType === "tel" ||
                inputType === "password" ||
                inputType === "email" ||
                inputType === "number" ||
                inputType === ""
            ) {
                return true;
            }
        }

        return false;
    }

    document.addEventListener("keydown", function (e) {
        var key = e.key || "";
        var keyCode = e.keyCode || 0;
        var target = e.target;
        var now = Date.now();

        if (e.repeat) return;
        if (arrowLock) return;
        if (now - lastArrowAt < 400) return;
        if (isEditableTargetForArrowKey(target)) return;

        if (target && target.tagName && target.tagName.toLowerCase() === "video") {
            return;
        }

        if (key === "ArrowLeft" || keyCode === 37) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "previous"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }

        if (key === "ArrowRight" || keyCode === 39) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "next"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }
    }, true);
})();
</script>

</body>
</html>
