<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PagingTale - 目次</title>
    <link rel="stylesheet" href="../css/style_page.css"></link>
    <script src="../js/toc.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 558px;
            height: 820px;
            overflow: hidden;
            font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
            background: #3F3631;
            color: #ffffff;
        }

        body {
            position: relative;
        }

        .page-wrap {
            position: relative;
            width: 558px;
            height: 820px;
            box-sizing: border-box;
            padding: 56px 40px 52px;
            background:
                linear-gradient(
                    to bottom,
                    rgba(255,255,255,0.05) 0%,
                    rgba(255,255,255,0.015) 18%,
                    rgba(0,0,0,0.04) 100%
                );
        }

        .page-wrap::before {
            content: "";
            position: absolute;
            inset: 18px;
            border: 1px solid rgba(255,255,255,0.10);
            pointer-events: none;
        }

        .toc-kicker {
            font-size: 11px;
            letter-spacing: 0.28em;
            color: rgba(255,255,255,0.60);
            margin-bottom: 10px;
        }

        .toc-title {
            margin: 0;
            font-size: 30px;
            line-height: 1;
            letter-spacing: 0.12em;
            font-weight: 700;
            color: #ffffff;
        }

        .toc-lead {
            margin-top: 14px;
            margin-bottom: 22px;
            font-size: 12px;
            line-height: 1.8;
            color: rgba(255,255,255,0.82);
        }

        .toc-scroll {
            position: absolute;
            left: 40px;
            right: 40px;
            top: 162px;
            bottom: 62px;
            overflow-y: auto;
            padding-right: 8px;
            box-sizing: border-box;

            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.28) transparent;
        }

        .toc-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .toc-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .toc-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.24);
            border-radius: 999px;
        }

        .toc-sections {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .toc-section {
            margin: 0;
        }

        .toc-section-title {
            margin: 0 0 10px 0;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.16);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.62);
        }

        .toc-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .toc-item {
            margin: 0 0 6px 0;
        }

        .toc-link {
            display: flex;
            align-items: baseline;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            padding: 8px 8px;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: left;
            cursor: pointer;
            font: inherit;
            border-radius: 6px;
            transition: background 0.18s ease, transform 0.18s ease;

            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }

        .toc-link:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        .toc-link:focus {
            outline: none;
            background: rgba(255,255,255,0.10);
        }

        .toc-item-title {
            white-space: nowrap;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .toc-item-dot {
            flex: 1;
            min-width: 16px;
            border-bottom: 1px dotted rgba(255,255,255,0.28);
            transform: translateY(-2px);
        }

        .toc-item-page {
            width: 36px;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.90);
        }

        .toc-empty {
            padding-top: 10px;
            font-size: 12px;
            line-height: 1.8;
            color: rgba(255,255,255,0.70);
        }

        .footer {
            position: absolute;
            left: 0;
            bottom: 18px;
            width: 100%;
            text-align: left;
            font-size: 11px;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.70);
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="toc-kicker">CONTENTS</div>
    <h1 class="toc-title">目 次</h1>

    <div class="toc-scroll">
        <div id="tocSections" class="toc-sections"></div>
    </div>

    <div class="footer">p003</div>
</div>

<script>
    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function formatPage(page) {
        var num = parseInt(page, 10);
        if (isNaN(num)) return "";
        return String(num).padStart(3, "0");
    }

    function normalizeSectionName(item) {
        if (item.section && String(item.section).trim() !== "") {
            return String(item.section).trim();
        }
        return "CONTENTS";
    }

    function groupTocItems(items) {
        var groups = [];
        var groupMap = {};

        items.forEach(function(item) {
            var sectionName = normalizeSectionName(item);

            if (!groupMap[sectionName]) {
                groupMap[sectionName] = {
                    name: sectionName,
                    items: []
                };
                groups.push(groupMap[sectionName]);
            }

            groupMap[sectionName].items.push(item);
        });

        return groups;
    }

    function goToBookPage(page) {
        var targetPage = parseInt(page, 10);

        if (isNaN(targetPage)) {
            console.error("ページ番号が不正です:", page);
            return;
        }

        try {
            window.parent.postMessage({
                type: "gotoPage",
                page: targetPage
            }, "*");
        } catch (e) {
            console.error("ページ移動に失敗しました:", e);
        }
    }

    function buildTOCPage() {
        var container = document.getElementById("tocSections");
        container.innerHTML = "";

        if (!window.TOC_ITEMS || !Array.isArray(window.TOC_ITEMS) || TOC_ITEMS.length === 0) {
            container.innerHTML = '<div class="toc-empty">目次データがありません。</div>';
            return;
        }

        var groups = groupTocItems(TOC_ITEMS);

        groups.forEach(function(group) {
            var section = document.createElement("section");
            section.className = "toc-section";

            var title = document.createElement("h2");
            title.className = "toc-section-title";
            title.textContent = group.name;
            section.appendChild(title);

            var list = document.createElement("ul");
            list.className = "toc-list";

            group.items.forEach(function(item) {
                var li = document.createElement("li");
                li.className = "toc-item";

                var button = document.createElement("button");
                button.className = "toc-link";
                button.type = "button";

                button.addEventListener("mousedown", function(e) {
                    e.preventDefault();
                });

                button.innerHTML =
                    '<span class="toc-item-title">' + escapeHtml(item.title || "") + '</span>' +
                    '<span class="toc-item-dot"></span>' +
                    '<span class="toc-item-page">' + escapeHtml(formatPage(item.page)) + '</span>';

                button.addEventListener("click", function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    goToBookPage(item.page);
                });

                li.appendChild(button);
                list.appendChild(li);
            });

            section.appendChild(list);
            container.appendChild(section);
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", buildTOCPage);
    } else {
        buildTOCPage();
    }
</script>

<script>
(function () {
    if (window.__pagingTaleArrowNavInserted) return;
    window.__pagingTaleArrowNavInserted = true;

    var arrowLock = false;
    var lastArrowAt = 0;

    function isEditableTargetForArrowKey(target) {
        if (!target) return false;

        var tagName = target.tagName ? target.tagName.toLowerCase() : "";

        if (target.isContentEditable) return true;
        if (tagName === "textarea") return true;
        if (tagName === "select") return true;
        if (tagName === "button") return true;

        if (tagName === "input") {
            var inputType = (target.type || "").toLowerCase();

            if (
                inputType === "text" ||
                inputType === "search" ||
                inputType === "url" ||
                inputType === "tel" ||
                inputType === "password" ||
                inputType === "email" ||
                inputType === "number" ||
                inputType === ""
            ) {
                return true;
            }
        }

        return false;
    }

    document.addEventListener("keydown", function (e) {
        var key = e.key || "";
        var keyCode = e.keyCode || 0;
        var target = e.target;
        var now = Date.now();

        if (e.repeat) return;
        if (arrowLock) return;
        if (now - lastArrowAt < 400) return;
        if (isEditableTargetForArrowKey(target)) return;

        if (target && target.tagName && target.tagName.toLowerCase() === "video") {
            return;
        }

        if (key === "ArrowLeft" || keyCode === 37) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "previous"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }

        if (key === "ArrowRight" || keyCode === 39) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "next"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }
    }, true);
})();
</script>

</body>
</html>
