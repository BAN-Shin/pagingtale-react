        }

        .note {

<body>

<div class="note note-1">
    <h2>遠近法の仕組み</h2>
    <p>
    人の目からまっすぐ線をのばして、
    物の大きさを見ています。

    近いものは大きく、
    遠いものは小さく見えます。

    これは物が小さくなるのではなく、
    「そう見える」だけなんです。
    </p>
</div>

<div class="note note-2">
    <h2>相似（同じ形のルール）</h2>
    <p>
    同じ角度でのびている線は、
    形は同じで、大きさだけ変わります。

    これを「相似（そうじ）」といいます。

    だから、遠くにあるものは、
    同じ形のまま小さくなります。
    </p>
</div>

<div class="note note-3">
    <h2>距離が2倍 → 大きさは1/2</h2>
    <p>
    もし距離が2倍になると、
    見える大きさは半分になります。

    だから、近くの箱は大きく、
    遠くの箱は小さく見えるのです。

    このルールを使うと、
    絵がとても描きやすくなります！
    </p>
</div>

<div class="footer">p021</div>

<script>
(function () {
    if (window.__pagingTaleArrowNavInserted) return;
    window.__pagingTaleArrowNavInserted = true;

    var arrowLock = false;
    var lastArrowAt = 0;

    function isEditableTargetForArrowKey(target) {
        if (!target) return false;

        var tagName = target.tagName ? target.tagName.toLowerCase() : "";

        if (target.isContentEditable) return true;
        if (tagName === "textarea") return true;
        if (tagName === "select") return true;
        if (tagName === "button") return true;

        if (tagName === "input") {
            var inputType = (target.type || "").toLowerCase();

            if (
                inputType === "text" ||
                inputType === "search" ||
                inputType === "url" ||
                inputType === "tel" ||
                inputType === "password" ||
                inputType === "email" ||
                inputType === "number" ||
                inputType === ""
            ) {
                return true;
            }
        }

        return false;
    }

    document.addEventListener("keydown", function (e) {
        var key = e.key || "";
        var keyCode = e.keyCode || 0;
        var target = e.target;
        var now = Date.now();

        if (e.repeat) return;
        if (arrowLock) return;
        if (now - lastArrowAt < 400) return;
        if (isEditableTargetForArrowKey(target)) return;

        if (target && target.tagName && target.tagName.toLowerCase() === "video") {
            return;
        }

        if (key === "ArrowLeft" || keyCode === 37) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "previous"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }

        if (key === "ArrowRight" || keyCode === 39) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "next"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }
    }, true);
})();
</script>

</body>
</html>
