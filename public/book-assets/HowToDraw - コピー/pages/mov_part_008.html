<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>蜜柑（演習）</title>
    <link rel="stylesheet" href="../css/style_page.css"></link>
    <style>
        body{
            border:none;
            overflow: hidden;
        }

        .frontLayer{
            z-index: 1000;
        }

        .margin-adjustment {
            margin: -9px;
        }

        :root {
            --area-left: 59.35px;
            --area-top: 84.79px;
            --area-width: 450.69px;
            --area-height: 639.02px;
            --button-color: #3F3631;
        }

        #mov_P008_mask_01 {
            position: absolute;
            left: var(--area-left);
            top: var(--area-top);
            width: var(--area-width);
            height: var(--area-height);
            overflow: visible;
            z-index: 20;
        }

        .media-stage {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .overlay-image,
        .grid-image {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .overlay-image {
            display: none;
        }

        /* reference（下） */
        #overlay-reference {
            z-index: 2;
        }

        /* motif（上） */
        #overlay-motif {
            z-index: 3;
        }

        /* grid（最前面） */
        .grid-image {
            z-index: 4;
            display: none;
        }

        .overlay-image.is-active {
            display: block;
        }

        .grid-image.is-visible {
            display: block;
        }

        .overlay-controls {
            position: absolute;
            left: 0;
            top: calc(100% + 10px);
            width: 100%;
            display: flex;
            gap: 8px;
            z-index: 30;
        }

        .overlay-btn {
            appearance: none;
            border: none;
            background: var(--button-color);
            color: #ffffff;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 999px;
            cursor: pointer;
        }

        .overlay-btn.is-active {
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
        }

        svg.page-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
        }

        svg.page-overlay object {
            pointer-events: none;
        }

        .clickablePath {
            pointer-events: auto;
        }
    </style>

    <script src="..\js\exe_script.js"></script>
    <script>
        var iframeId = "iframe8";
        initializeMaskSizes(iframeId);

        function showOverlay(type) {
            const reference = document.getElementById("overlay-reference");
            const motif = document.getElementById("overlay-motif");
            const btnReference = document.getElementById("btn-reference");
            const btnMotif = document.getElementById("btn-motif");

            reference.classList.remove("is-active");
            motif.classList.remove("is-active");
            btnReference.classList.remove("is-active");
            btnMotif.classList.remove("is-active");

            if (type === "reference") {
                reference.classList.add("is-active");
                btnReference.classList.add("is-active");
            } else if (type === "motif") {
                motif.classList.add("is-active");
                btnMotif.classList.add("is-active");
            }
        }

        function toggleGrid() {
            const grid = document.getElementById("overlay-grid");
            const btnGrid = document.getElementById("btn-grid");
            const visible = grid.classList.toggle("is-visible");
            btnGrid.classList.toggle("is-active", visible);
        }

        window.addEventListener("DOMContentLoaded", function () {
            showOverlay("motif"); // ★ 初期表示をモチーフに変更
        });
    </script>
</head>
<body>

    <div id="mov_P008_mask_01">
        <div class="media-stage">
            <!-- reference -->
            <img
                id="overlay-reference"
                class="overlay-image"
                src="../material/page_008/mov/k01_p008_reference.png"
            >

            <!-- motif（最初から表示） -->
            <img
                id="overlay-motif"
                class="overlay-image is-active"
                src="../material/page_008/mov/k01_p008_motif.png"
            >

            <!-- grid -->
            <img
                id="overlay-grid"
                class="grid-image"
                src="../material/page_008/mov/k01_p008_grid.png"
            >
        </div>

        <div class="overlay-controls">
            <!-- ★ 左にモチーフ -->
            <button id="btn-motif" class="overlay-btn is-active" onclick="showOverlay('motif')">motif</button>
            <button id="btn-reference" class="overlay-btn" onclick="showOverlay('reference')">reference</button>
            <button id="btn-grid" class="overlay-btn" onclick="toggleGrid()">grid</button>
        </div>
    </div>

        <object type="image/svg+xml" data="../material/page_008/008_01_btn.svg" width="558" height="820"></object>
        <rect class="clickablePath" x="59.35" y="84.79" width="450.69" height="639.02"/>
    </svg> -->

    <div class="footer">p008</div>

<script>
(function () {
    if (window.__pagingTaleArrowNavInserted) return;
    window.__pagingTaleArrowNavInserted = true;

    var arrowLock = false;
    var lastArrowAt = 0;

    function isEditableTargetForArrowKey(target) {
        if (!target) return false;

        var tagName = target.tagName ? target.tagName.toLowerCase() : "";

        if (target.isContentEditable) return true;
        if (tagName === "textarea") return true;
        if (tagName === "select") return true;
        if (tagName === "button") return true;

        if (tagName === "input") {
            var inputType = (target.type || "").toLowerCase();

            if (
                inputType === "text" ||
                inputType === "search" ||
                inputType === "url" ||
                inputType === "tel" ||
                inputType === "password" ||
                inputType === "email" ||
                inputType === "number" ||
                inputType === ""
            ) {
                return true;
            }
        }

        return false;
    }

    document.addEventListener("keydown", function (e) {
        var key = e.key || "";
        var keyCode = e.keyCode || 0;
        var target = e.target;
        var now = Date.now();

        if (e.repeat) return;
        if (arrowLock) return;
        if (now - lastArrowAt < 400) return;
        if (isEditableTargetForArrowKey(target)) return;

        if (target && target.tagName && target.tagName.toLowerCase() === "video") {
            return;
        }

        if (key === "ArrowLeft" || keyCode === 37) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "previous"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }

        if (key === "ArrowRight" || keyCode === 39) {
            e.preventDefault();
            e.stopPropagation();

            arrowLock = true;
            lastArrowAt = now;

            window.parent.postMessage({
                type: "turnByArrow",
                direction: "next"
            }, "*");

            setTimeout(function () {
                arrowLock = false;
            }, 450);

            return;
        }
    }, true);
})();
</script>

</body>
</html>
